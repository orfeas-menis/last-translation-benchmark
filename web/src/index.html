<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    input {
      width: calc(100% - 22px);
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 0.92em;
      margin-bottom: 12px;
      background: #fff;
    }


    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .12);
      width: 380px;
    }

    .login-box h1 {
      margin: 0 0 6px;
      font-size: 1.35em;
      color: #1e293b;
    }

    .login-box .sub {
      color: #64748b;
      font-size: 0.88em;
      margin: 0 0 24px;
    }

    .demo-hint {
      font-size: 0.78em;
      color: #94a3b8;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>🪨 Last Translation Benchmark</h1>
      <p class="sub">a large-scale effort to collect difficult-to-translate inputs</p>
      <form id="login-form">
        <label for="l-user">Username</label>
        <input type="username" id="l-user" placeholder="username" autocomplete="username">
        <label for="l-pass">Password</label>
        <input type="password" id="l-pass" placeholder="password" autocomplete="current-password">
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
        <p id="l-err" class="msg-err" style="display:none;text-align:center;margin-top:8px"></p>
      </form>
    </div>
  </div>
</body>

</html>
