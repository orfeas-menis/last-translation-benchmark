<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>🌐 LTB</h1>
      <p class="sub">Last Translation Benchmark — collecting difficult-to-translate texts</p>
      <form id="login-form">
        <label for="l-user">Username</label>
        <input type="text" id="l-user" placeholder="username" autocomplete="username">
        <label for="l-pass">Password</label>
        <input type="password" id="l-pass" placeholder="password" autocomplete="current-password">
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
        <p id="l-err" class="msg-err" style="display:none;text-align:center;margin-top:8px"></p>
      </form>
      <p class="demo-hint">Demo: senior1/senior123 · annotator1/ann123 · annotator2/ann456</p>
    </div>
  </div>
</body>
</html>
