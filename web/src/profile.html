<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    .profile-wrap {
      max-width: 500px;
      margin: 60px auto;
      padding: 32px;
    }

    .profile-wrap h2 {
      font-size: 1.5em;
      margin-bottom: 8px;
      border-bottom: none;
      padding-bottom: 0;
      text-align: center;
    }

    .profile-wrap .sub {
      text-align: center;
      margin-bottom: 32px;
      color: #64748b;
      font-size: 0.95em;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .check-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 20px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }

    .check-row input[type="checkbox"] {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .check-row label {
      font-weight: 400;
      font-size: 0.9em;
      line-height: 1.5;
      cursor: pointer;
      margin-bottom: 0;
    }

    .legal-notice {
      font-size: 0.85em;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .btn-full {
      width: 100%;
      padding: 12px;
      font-size: 1em;
    }

    #status-msg {
      margin-top: 16px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1><img src="assets/favicon.svg" style="height: 1em;"> Last Translation Benchmark</h1>
    </a>
    <div id="header-status" style="display: none; align-items: center; gap: 16px;">
      <span class="info" title="How many times you can run the translation.">
        <span id="quota-text"></span>
      </span>
      <span class="info" title="Total confirmed contributions.">
        <span id="total-points">0</span> accepted
      </span>
      <span id="username-info" class="info"></span>
    </div>
  </header>

  <div class="card profile-wrap">
    <h2>Complete your profile</h2>
      <p class="sub">This information is required before you can contribute.</p>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Jane Doe">
      </div>

      <div class="form-group">
        <label for="affiliation">Affiliation</label>
        <input type="text" id="affiliation" placeholder="University / Company">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="jane@example.com">
      </div>

      <div class="check-row">
        <input type="checkbox" id="credit-consent">
        <label for="credit-consent">
          I wish to be credited non-anonymously in any resulting publication under the above name & affiliation.
        </label>
      </div>

      <p class="legal-notice">
        By continuing, you agree that your contributed anonymized data may be used in research under the MIT license.
      </p>

    <button class="btn btn-success btn-full" id="save-btn">Save &amp; Continue</button>
    <div id="status-msg"></div>
  </div>
</body>

</html>
