<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1>🪨 Last Translation Benchmark</h1>
    </a>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span id="sen-info" class="info"></span>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Review Submissions</h2>
      <div class="tabs">
        <select id="filter-status" class="tab" style="width:auto">
          <option value="pending">Pending</option>
          <option value="scored">Scored</option>
          <option value="all">All</option>
        </select>
        <select id="filter-lang" class="tab" style="width:auto">
          <option value="">All Languages</option>
        </select>
        <select id="filter-user" class="tab" style="width:auto">
          <option value="">All Users</option>
        </select>
        <button class="tab" style="margin-left:auto" id="refresh-btn">↻ Refresh</button>
      </div>
      <div id="sen-list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </div>
</body>

</html>
