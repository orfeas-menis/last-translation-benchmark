<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark — Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    .admin-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: stretch;
    }

    @media (max-width: 860px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    .tbl-wrap {
      overflow-x: auto;
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
    }

    th {
      text-align: left;
      padding: 10px;
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      border-bottom: 2px solid #e5e7eb;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
      color: #334155;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .role-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75em;
      font-weight: 700;
      margin-right: 4px;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
      user-select: none;
    }

    .role-tag:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    .role-tag:active {
      transform: translateY(0);
    }

    .role-inactive {
      background: #f1f5f9 !important;
      color: #94a3b8 !important;
    }

    .role-admin {
      background: #ede9fe;
      color: #5b21b6;
    }

    .role-reviewer {
      background: #fef3c7;
      color: #92400e;
    }

    .role-contributor {
      background: #dcfce7;
      color: #166534;
    }

    .muted {
      color: #94a3b8;
      font-style: italic;
    }

    .action-btns {
      display: flex;
      gap: 4px;
    }

    .act-btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
      transition: opacity .1s;
    }

    .act-btn:hover {
      opacity: .7;
    }

    .act-copy {
      background: #e0f2fe;
      color: #0369a1;
    }

    .act-rotate {
      background: #fef9c3;
      color: #92400e;
    }

    .act-delete {
      background: #fee2e2;
      color: #991b1b;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85em;
      opacity: 0;
      transition: opacity .2s;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
    }

    .uname {
      font-family: monospace;
      font-size: 1.1em;
    }

    .admin-input {
      padding: 5px 8px;
      font-size: 0.85em;
      border: 1px solid #d1d5db;
      border-radius: 5px;
    }

    #filtered-count {
      font-size: 0.8em;
      color: #64748b;
      margin-top: 4px;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .email-cell {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .email-cell a {
      color: inherit;
    }

    .scope-cell {
      width: 100px;
      max-width: 100px;
      min-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.scope-cell {
      font-family: monospace;
      font-size: 0.85em;
      cursor: pointer;
      color: #475569;
    }

    td.scope-cell:hover {
      background: #f1f5f9;
    }
  </style>
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1>🪨 Last Translation Benchmark</h1>
    </a>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span id="admin-info" class="info"></span>
    </div>
  </header>

  <div class="container" style="max-width: 1400px;">
    <div class="admin-grid">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 style="margin:0">Users</h2>
          <div style="display:flex; gap:8px;">
            <select id="role-filter" class="admin-input">
              <option value="">All Roles</option>
              <option value="contributor">Contributor</option>
              <option value="reviewer">Reviewer</option>
              <option value="admin">Admin</option>
            </select>
            <input id="filter-input" type="text" placeholder="Search…" class="admin-input" style="width:150px;">
          </div>
        </div>
        <div class="tbl-wrap">
          <div id="user-table">
            <div class="empty">Loading…</div>
          </div>
        </div>
        <span id="filtered-count"></span>
      </div>
    </div>
  </div>
  <div id="toast"></div>
</body>

</html>
