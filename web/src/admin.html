<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>


    .tbl-wrap {
      overflow-x: auto;
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
    }

    th {
      text-align: left;
      padding: 10px;
      color: #475569;
      font-weight: 700;
      border-bottom: 1px solid #e2e8f0;
    }

    td {
      padding: 10px;
      vertical-align: middle;
      color: #334155;
    }

    tr:hover td {
      background: #ddd;
    }

    .role-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75em;
      font-weight: 700;
      margin-right: 4px;
      cursor: pointer;
      user-select: none;
    }

    .role-tag:hover {
      opacity: 0.8;
    }

    .role-inactive {
      background: #f1f5f9 !important;
      color: #94a3b8 !important;
    }

    .role-admin {
      background: #ede9fe;
      color: #5b21b6;
    }

    .role-reviewer {
      background: #fef3c7;
      color: #92400e;
    }

    .role-contributor {
      background: #dcfce7;
      color: #166534;
    }

    .muted {
      color: #94a3b8;
      font-style: italic;
    }

    .action-btns {
      display: flex;
      gap: 4px;
    }

    .act-btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }

    .act-btn:hover {
      opacity: 0.6;
    }

    .act-quota {
      background: #fef9c3;
      color: #92400e;
    }

    .act-delete {
      background: #fee2e2;
      color: #991b1b;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85em;
      opacity: 0;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
    }

    .uname {
      font-family: monospace;
      font-size: 1.1em;
      color: inherit;
      text-decoration: none;
    }

    .uname:hover {
      text-decoration: underline;
    }

    .admin-input {
      padding: 5px 8px;
      font-size: 0.85em;
      border: 1px solid #d1d5db;
      border-radius: 5px;
    }

    #filtered-count {
      font-size: 0.8em;
      color: #64748b;
      margin-top: 4px;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .email-cell {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .affil-cell {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sugg-cell {
      min-width: 100px;
    }

    .email-cell a {
      color: inherit;
    }

    .scope-cell {
      width: 100px;
      max-width: 200px;
      min-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.scope-cell {
      font-family: monospace;
      font-size: 0.85em;
      cursor: pointer;
      color: #475569;
    }
  </style>
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1><img src="assets/favicon.svg" style="height: 1em;">
        Last Translation Benchmark
      </h1>
    </a>
    <div id="header-status" style="display: none; align-items: center; gap: 16px;">
      <span class="info" title="How many times you can run the translation.">
        <span id="quota-text"></span>
      </span>
      <span class="info" title="Total confirmed contributions.">
        <span id="total-points">0</span> accepted
      </span>
      <span id="username-info" class="info"></span>
    </div>
  </header>

  <div class="container" style="max-width: 1400px;">
    <div class="card" style="margin-bottom: 20px;" id="overview-card">
      <h2 style="margin:0; margin-bottom:12px;">Submission overview</h2>
      <div id="overview-content" style="font-size: 0.9em; line-height: 1.5;">Loading...</div>
    </div>

    <hr style="border: 0; border-top: 4px solid black; margin: 24px 0;">

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 style="margin:0">Users</h2>
          <div style="display:flex; gap:8px;">
            <select id="role-filter" class="admin-input">
              <option value="">All Roles</option>
              <option value="contributor">Contributor</option>
              <option value="reviewer">Reviewer</option>
              <option value="admin">Admin</option>
            </select>
            <input id="filter-input" type="text" placeholder="Search…" class="admin-input" style="width:150px;">
          </div>
        </div>
        <div class="tbl-wrap">
          <div id="user-table">
            <div class="empty">Loading…</div>
          </div>
        </div>
        <span id="filtered-count"></span>
      </div>
  </div>
  <div id="toast"></div>
</body>

</html>
