<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1><img src="assets/favicon.svg" style="height: 1em;"> Last Translation Benchmark</h1>
    </a>
    <div id="header-status" style="display: none; align-items: center; gap: 16px;">
      <span class="info" title="How many times you can run the translation.">
        <span id="quota-text"></span>
      </span>
      <span class="info" title="Total confirmed contributions.">
        <span id="total-points">0</span> accepted
      </span>
      <span id="username-info" class="info"></span>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="tabs">
        <div id="instructions-box" class="card" style="margin-bottom: 24px; max-height: 400px; overflow-y: auto; border-left: 4px solid black;"></div>
        <select id="filter-status" class="tab" style="width:150px">
          <option value="pending">Pending</option>
          <option value="accepted_or_returned">Accepted or Returned</option>
          <option value="accepted">Accepted</option>
          <option value="returned">Returned</option>
          <option value="all">All</option>
        </select>
        <select id="filter-source-lang" class="tab" style="width:180px">
          <option value="">All Source Languages</option>
        </select>
        <select id="filter-target-lang" class="tab" style="width:180px">
          <option value="">All Target Languages</option>
        </select>
        <select id="filter-user" class="tab" style="width:180px">
          <option value="">All Users</option>
        </select>
      </div>
      <div id="sen-list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </div>
</body>

</html>
