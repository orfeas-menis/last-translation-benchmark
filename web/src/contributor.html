<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    /* ---------- two-column contributor layout ---------- */
    #contributor-layout {
      display: grid;
      grid-template-columns: 1fr 450px;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 800px) {
      #contributor-layout {
        grid-template-columns: 1fr;
      }
    }

    #main-col .card {
      margin-bottom: 0;
    }

    #sidebar-card {
      height: calc(100vh - 140px);
      overflow-y: auto;
      position: sticky;
      top: 20px;
    }

    /* ---------- sidebar mini-submission ---------- */
    .sug-mini {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 0.85em;
    }

    .sug-mini-meta {
      font-size: 0.75em;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .sug-mini-text {
      color: #1e293b;
      font-weight: 500;
      margin-bottom: 2px;
      word-break: break-word;
    }

    .sug-mini-tr {
      color: #475569;
      font-size: 0.88em;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .sug-mini-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }

    .sug-mini-vc {
      background: #f1f5f9;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.82em;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }

    /* ---------- misc contributor items ---------- */
    #lang-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    #lang-row>* {
      flex: 1;
    }

    /* .lang-input is now handled by global styles */
  </style>
</head>

<body>
  <header>
    <a href="/" style="text-decoration:none;color:inherit;">
      <h1>🪨 Last Translation Benchmark</h1>
    </a>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span class="info">
        🔋 <span id="quota-text"></span>
      </span>
      <span class="info">
        ⭐ <span id="total-points">0</span> points
      </span>
      <span id="ann-info" class="info"></span>
    </div>
  </header>

  <div class="container">
    <button id="show-instructions-btn" class="btn btn-instructions">📖 Show guidelines for contributing</button>
    <div id="instructions-box" style="margin-bottom: 20px;"></div>

    <div id="contributor-layout">

      <!-- ===== MAIN FORM COLUMN ===== -->
      <div id="main-col">
        <div class="card">
          <h2>New Submission</h2>

          <div id="lang-row">
            <div>
              <label for="src-lang">Source Language</label>
              <input type="text" id="src-lang" list="src-langs" value="English" placeholder="e.g. English, custom...">
              <datalist id="src-langs"></datalist>
            </div>
            <div>
              <label for="tgt-lang">Target Language</label>
              <input type="text" id="tgt-lang" list="tgt-langs" value="German" placeholder="e.g. German, custom...">
              <datalist id="tgt-langs"></datalist>
            </div>
          </div>

          <label for="src-text">Input <span class="hint">(the difficult-to-translate text)</span></label>
          <textarea id="src-text" placeholder="Enter the source text…"></textarea>

          <div
            style="display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;">
            <span id="tr-status" style="font-size:0.85em;color:#64748b"></span>
            <button class="btn btn-secondary" id="tr-btn">⟳ Translate by all models</button>
          </div>


          <!-- API results table -->
          <div id="api-results">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
              <span style="font-size: 0.85em; font-weight: 600; color: #475569;">Translations</span>
              <span id="pass-count" style="font-size: 0.82em;"></span>
            </div>
            <!-- Own Translation -->

            <div class="api-result-row" style="margin-bottom: 12px; background: #fff; border-color: #cbd5e1;">
              <span class="api-name">Perfect translation</span>
              <div class="tr-display" style="flex: 1; display: flex;">
                <textarea id="own-translation" placeholder="Type your own translation here..."
                  style="width: 100%; border: none; outline: none; background: transparent; color: inherit; resize: vertical; min-height: 24px; padding: 0; margin: 0;"></textarea>
              </div>
              <span class="verify-pill" id="own-verify-badge"></span>
            </div>
            <div id="api-results-body"></div>
          </div>

          <label id="vc-label">
            Verification rules
            <span class="hint">(all rules must pass)</span>
          </label>
          <div id="rules-container" style="margin-bottom: 8px;"></div>
          <button class="btn btn-secondary" id="add-rule-btn"
            style="margin-bottom: 12px; padding: 4px 10px; font-size: 0.85em;">+ Add Rule</button>


          <div
            style="display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;">
            <span id="verify-result"></span>
            <button class="btn btn-secondary" id="verify-btn">✓ Verify translations</button>
          </div>

          <div style="display: flex; justify-content: flex-end; align-items: center;">
            <span id="submit-status" style="margin-right:10px;font-size:0.85em"></span>
            <button class="btn btn-secondary" id="cancel-edit-btn" style="display:none; margin-right:10px;">Cancel
              Edit</button>
            <button class="btn btn-success" id="submit-btn">Submit Input, Translations & Rule</button>
          </div>
        </div>
      </div>

      <!-- ===== SIDEBAR COLUMN ===== -->
      <div>
        <div id="sidebar-card" class="card">
          <h2>My Submissions</h2>
          <div id="my-submissions">
            <div class="empty">No submissions yet</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
