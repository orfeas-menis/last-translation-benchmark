<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTB — Contributor</title>
</head>

<body>
  <header>
    <h1>🌐 Last Translation Benchmark</h1>
    <div>
      <span id="ann-info" class="info"></span>
      &nbsp;<button id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- stats bar -->
  <div class="stats-bar">
    <div class="quota-section">
      <span class="quota-label">Daily quota:</span>
      <div class="bar">
        <div class="fill" id="quota-fill" style="width:100%"></div>
      </div>
      <span id="quota-text" class="quota-label"></span>
    </div>
    <div class="points-section">
      ⭐ <span id="total-points">0</span> points earned
    </div>
  </div>

  <div class="container">
    <div class="contributor-layout">

      <!-- ===== MAIN FORM COLUMN ===== -->
      <div class="main-col">
        <div class="card">
          <h2>Submit New Suggestion</h2>

          <div class="row2">
            <div>
              <label for="src-lang">Source Language</label>
              <select id="src-lang">
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ru">Russian</option>
                <option value="ar">Arabic</option>
                <option value="pt">Portuguese</option>
                <option value="it">Italian</option>
              </select>
            </div>
            <div>
              <label for="tgt-lang">Target Language</label>
              <select id="tgt-lang">
                <option value="de">German</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ru">Russian</option>
                <option value="ar">Arabic</option>
                <option value="pt">Portuguese</option>
                <option value="it">Italian</option>
              </select>
            </div>
          </div>

          <label for="src-text">Source Text <span class="hint">(the difficult-to-translate text)</span></label>
          <textarea id="src-text" placeholder="Enter the source text…"></textarea>

          <div class="inline-row">
            <button class="btn btn-secondary" id="tr-btn">⟳ Translate by 5 models</button>
            <span id="tr-status" style="font-size:0.85em;color:#64748b"></span>
          </div>

          <!-- API results table (shown after translation) -->
          <div id="api-results" style="display:none">
            <div class="api-results-header">
              <span class="api-results-label">Translations</span>
              <span id="pass-count" class="pass-count"></span>
            </div>
            <div id="api-results-body"></div>
          </div>

          <label id="vc-label" for="vc-content">LLM prompt <span class="hint">(used to verify the
              translation)</span></label>
          <textarea id="vc-content"
            placeholder="e.g. Does the translation preserve the pun from the source text? (To use regex, start with #!regex)"
            style="min-height:56px"></textarea>

          <div class="inline-row">
            <button class="btn btn-secondary" id="verify-btn">✓ Test Verification</button>
            <span id="verify-result"></span>
          </div>

          <button class="btn btn-success" id="submit-btn">Submit Suggestion</button>
          <span id="submit-status" style="margin-left:10px;font-size:0.85em"></span>
        </div>
      </div>

      <!-- ===== SIDEBAR COLUMN ===== -->
      <div class="sidebar-col">
        <div class="card sidebar-card">
          <h2>My Submissions</h2>
          <div id="my-list">
            <div class="empty">No submissions yet</div>
          </div>
        </div>
      </div>

    </div><!-- /.contributor-layout -->
  </div><!-- /.container -->
</body>

</html>
